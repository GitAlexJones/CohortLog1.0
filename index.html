<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COHORTLOG 1.2 — Life Table Analysis</title>
<meta name="description" content="Interactive life table analysis tool for fisheries demography. Calculate R₀, generation time, and intrinsic rate of increase from cohort survival and fecundity data.">
<meta name="author" content="Michael Stocklin">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

<style>
  html, body { margin: 0; padding: 0; background: #051520; }
  body { font-family: "IBM Plex Sans", "Helvetica Neue", sans-serif; color: #d6e3ea; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }
  *::selection { background: #e8c35a; color: #0a2230; }
  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #051520; color: #e8c35a; font-family: "VT323", monospace; font-size: 22px;
    letter-spacing: 0.15em; z-index: 100; flex-direction: column; gap: 10px;
  }
  #loading .blink { animation: blink 1s steps(2) infinite; }
  #loading .err { color: #d87060; font-size: 13px; max-width: 380px; text-align: center; }
  @keyframes blink { 50% { opacity: 0.3; } }
  button { -webkit-tap-highlight-color: transparent; }
  button:focus-visible { outline: 2px solid #e8c35a; outline-offset: 2px; }
  input:focus-visible { border-color: #e8c35a !important; }

  @keyframes bubbleRise {
    0%   { transform: translateY(0)      translateX(0); opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 1; }
    100% { transform: translateY(-110vh) translateX(0); opacity: 0; }
  }
  @keyframes bubbleWobble {
    0%   { margin-left: 0; }
    100% { margin-left: var(--wobble, 20px); }
  }
  @keyframes tutorialPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(232,195,90,0.6), inset 0 0 20px rgba(232,195,90,0.15); }
    50%      { box-shadow: 0 0 30px rgba(232,195,90,0.9), inset 0 0 25px rgba(232,195,90,0.25); }
  }

  @media (max-width: 480px) {
    header > div > div:first-child { font-size: 18px !important; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; }
  }
  @media print {
    nav, footer { display: none !important; }
    button { display: none; }
  }
</style>
</head>
